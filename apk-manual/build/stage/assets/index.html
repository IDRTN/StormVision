<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<title>StormVision</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,sans-serif;overflow:hidden;user-select:none;width:100vw;width:100dvw;height:100vh;height:100dvh;touch-action:none;padding:env(safe-area-inset-top,0px) env(safe-area-inset-right,0px) env(safe-area-inset-bottom,0px) env(safe-area-inset-left,0px)}
#app{width:100%;height:100%;display:flex;flex-direction:column;position:relative}
.header{padding:calc(env(safe-area-inset-top,0px) + 6px) 12px 6px 12px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,0.85);border-bottom:1px solid #222;min-height:40px;z-index:100}
.header h1{color:#50C8FF;font-size:16px;font-weight:bold;letter-spacing:0.5px}
.header .status{color:#888;font-size:10px}
.camera-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;background:#0a0a0a}
.camera-box{width:min(92vw,92dvw);max-width:400px;aspect-ratio:4/3;border-radius:10px;background:#1a1a2e;border:1px solid #333;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
#phoneVideo{width:100%;height:100%;object-fit:cover;display:none;position:absolute;top:0;left:0}
#camLabel{color:#50C8FF;font-size:13px;font-weight:600;text-align:center;padding:8px;z-index:2}
#frameInfo{color:rgba(255,255,255,0.4);font-size:9px;margin-top:2px;z-index:2}
.cloud-cell{position:absolute;background:rgba(255,255,0,0.1);pointer-events:none;border:1px solid rgba(255,255,0,0.2);z-index:3}

/* HUD */
.hud{position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.8);border-radius:6px;padding:5px 8px;font-size:9px;min-width:95px;z-index:10}
.hud .hud-title{color:#50C8FF;font-size:8px;font-weight:bold;letter-spacing:1px;margin-bottom:3px}
.hud .hud-row{color:rgba(255,255,255,0.8);margin-bottom:1px;display:flex;justify-content:space-between;font-size:9px}
.hud .hud-row span:last-child{color:#fff}

/* Compass */
.compass-wrap{position:absolute;bottom:6px;left:6px;width:44px;height:44px;z-index:10}
.compass-ring{width:44px;height:44px;border-radius:22px;border:2px solid rgba(80,200,255,0.4);position:relative}
.compass-needle{position:absolute;top:1px;left:calc(50% - 1px);width:2px;height:19px;background:#FF4444;border-radius:1px;transform-origin:bottom center}
.compass-n{position:absolute;top:2px;left:calc(50% - 3px);font-size:6px;color:#50C8FF;font-weight:bold}
.compass-label{position:absolute;bottom:-13px;left:50%;transform:translateX(-50%);font-size:7px;color:#888;white-space:nowrap}

/* Storm alert */
.alert-bar{position:absolute;top:2px;left:2px;right:2px;padding:4px;border-radius:5px;z-index:20;text-align:center;animation:pulse 1.5s infinite}
.alert-bar.severe{background:#8B0000}.alert-bar.moderate{background:#CC5500}
.alert-bar .alert-title{color:#fff;font-size:11px;font-weight:bold}
.alert-bar .alert-sub{color:rgba(255,255,255,0.9);font-size:9px;margin-top:1px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}

/* Controls bar */
.controls{display:flex;justify-content:space-around;padding:6px 2px calc(env(safe-area-inset-bottom,0px) + 6px) 2px;background:rgba(0,0,0,0.9);border-top:1px solid #222;z-index:100}
.ctrl{display:flex;flex-direction:column;align-items:center;padding:3px 6px;min-width:42px;cursor:pointer;transition:all 0.15s}
.ctrl .icon{font-size:18px;line-height:1.2}
.ctrl .lbl{color:#888;font-size:8px;margin-top:1px}
.ctrl.active .icon{opacity:1}.ctrl.active{border-radius:5px;background:rgba(80,200,255,0.1)}
.ctrl:active{transform:scale(0.92)}

/* Pressure */
.pressure-badge{position:absolute;bottom:6px;right:6px;font-size:9px;color:#888;z-index:10;text-align:right;background:rgba(0,0,0,0.6);padding:2px 6px;border-radius:4px}

/* Insta360 PiP overlay */
#insta360Overlay{position:absolute;top:4px;left:4px;width:90px;height:90px;border-radius:8px;border:2px solid rgba(80,200,255,0.6);overflow:hidden;z-index:15;background:#111;display:none;cursor:grab;touch-action:none}
#insta360Canvas{width:100%;height:100%}
#insta360Label{position:absolute;bottom:2px;left:2px;font-size:6px;color:#50C8FF;background:rgba(0,0,0,0.6);padding:1px 4px;border-radius:2px}

/* 360 expanded mode */
#insta360Expand{position:absolute;top:0;left:0;width:100%;height:100%;z-index:50;display:none;background:#000}
#insta360ExpandCanvas{width:100%;height:100%}
#insta360Close{position:absolute;top:8px;right:8px;z-index:51;background:rgba(0,0,0,0.7);color:#fff;border:none;border-radius:20px;width:32px;height:32px;font-size:18px;cursor:pointer}

/* Recording indicator */
.rec-indicator{position:absolute;top:2px;left:50%;transform:translateX(-50%);background:rgba(255,0,0,0.8);padding:2px 10px;border-radius:10px;font-size:9px;color:#fff;display:none;z-index:15;animation:pulse 1s infinite}
.rec-indicator .dot{display:inline-block;width:6px;height:6px;background:red;border-radius:3px;margin-right:4px;animation:pulse 0.5s infinite}
</style>
</head>
<body>
<div id="loadingScreen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#000;color:#50C8FF;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;font-family:sans-serif;">
  <div style="font-size:48px;margin-bottom:16px;">⛈</div>
  <div style="font-size:18px;font-weight:bold;margin-bottom:8px;">StormVision</div>
  <div style="font-size:12px;color:#888;" id="loadingStatus">Loading...</div>
  <div style="margin-top:16px;width:120px;height:3px;background:#333;border-radius:2px;overflow:hidden;">
    <div style="width:30%;height:100%;background:#50C8FF;border-radius:2px;animation:loadbar 1.5s infinite;"></div>
  </div>
</div>
<style>
@keyframes loadbar{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}}
</style>
<div id="app">
  <div class="header">
    <h1>⛈ StormVision</h1>
    <div class="status" id="statusText">Initializing...</div>
  </div>

  <div class="camera-wrap">
    <div class="camera-box" id="cameraBox">
      <video id="phoneVideo" autoplay playsinline muted></video>
      <div class="label" id="camLabel">☁️ Sky Camera</div>
      <div class="frame-info" id="frameInfo">Frame 0</div>
      <div id="cloudOverlay" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:3"></div>
      <div id="stormAlert" style="display:none" class="alert-bar">
        <div class="alert-title" id="alertTitle"></div>
        <div class="alert-sub" id="alertSub"></div>
      </div>

    <!-- HUD Dashboard -->
    <div class="hud" id="hud">
      <div class="hud-title">📊 LIVE</div>
      <div class="hud-row"><span>Clouds</span><span id="hudClouds">0</span></div>
      <div class="hud-row"><span>Cover</span><span id="hudCover">0%</span></div>
      <div class="hud-row"><span>Score</span><span id="hudScore">0%</span></div>
      <div class="hud-row"><span>Type</span><span id="hudType">--</span></div>
      <div class="hud-row" style="margin-top:3px;border-top:1px solid #333;padding-top:3px">
        <span>Motion</span><span id="hudMotion">--</span>
      </div>
      <div class="hud-row" style="margin-top:3px;border-top:1px solid #333;padding-top:3px">
        <span>Wind</span><span id="hudWindDir">--</span>
      </div>
    </div>

    <!-- Compass -->
    <div class="compass-wrap" id="compass">
      <div class="compass-ring">
        <div class="compass-n">N</div>
        <div class="compass-needle" id="compassNeedle"></div>
      </div>
      <div class="compass-label" id="compassLabel">0°</div>
    </div>

    <!-- Insta360 PiP -->
    <div id="insta360Overlay">
      <canvas id="insta360Canvas" width="180" height="180"></canvas>
      <div id="insta360Label">🌐 360°</div>
    </div>

    <!-- Insta360 Expanded -->
    <div id="insta360Expand">
      <canvas id="insta360ExpandCanvas"></canvas>
      <button id="insta360Close">✕</button>
    </div>

    <!-- Pressure -->
    <div class="pressure-badge" id="pressureDisplay">🌡️ -- hPa</div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="ctrl" id="ctrlMask"><span class="icon">☁️</span><span class="lbl">Mask</span></div>
    <div class="ctrl" id="ctrlMic"><span class="icon">🎤</span><span class="lbl">Record</span></div>
    <div class="ctrl" id="ctrlCam"><span class="icon">📷</span><span class="lbl">Source</span></div>
    <div class="ctrl" id="ctrl360"><span class="icon">🌐</span><span class="lbl">360</span></div>
    <div class="ctrl" id="ctrlReset"><span class="icon">🔄</span><span class="lbl">Reset</span></div>
  </div>
</div>

<script>
// Global error handler
window.onerror = function(msg, url, line) {
  var el = document.getElementById('loadingStatus');
  if (el) { el.textContent = 'Error: ' + msg; el.style.color = '#ff4444'; }
  console.error('StormVision error:', msg, url, line);
  return true;
};
// Hide loading on DOM ready
function hideLoading() {
  var ls = document.getElementById('loadingScreen');
  if (ls) { ls.style.display = 'none'; }
}
document.addEventListener('DOMContentLoaded', hideLoading);
setTimeout(hideLoading, 5000); // fallback hide after 5s

// ===== StormVision Enhanced App =====
const $ = id => document.getElementById(id);

// States
let showMask = true;
let useMock = true;
let cameraActive = false;
let isRecording = false;
let frameCount = 0;
let cloudData = { mask: [], count: 0, cover: 0, score: 0, type: '' };
let motion = { dx: 0, dy: 0, mag: 0, dir: 0 };
let phoneStream = null;

// Insta360 state
let insta360 = {
  active: false,
  expanded: false,
  yaw: 0,        // horizontal rotation
  pitch: 0,      // vertical rotation
  zoom: 1,
  lastTouchX: 0,
  lastTouchY: 0,
  lastTouchDist: 1,
  connected: false
};

// ===== Phone Camera =====
async function startCamera() {
  try {
    const constraints = {
      video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } },
      audio: false
    };
    phoneStream = await navigator.mediaDevices.getUserMedia(constraints);
    const video = $('phoneVideo');
    video.srcObject = phoneStream;
    await video.play();
    cameraActive = true;
    video.style.display = 'block';
    $('camLabel').textContent = '📷 Live Camera';
    $('camLabel').style.display = 'none';
    $('statusText').textContent = 'Camera OK';
    return true;
  } catch(e) {
    console.warn('Camera access denied:', e.message);
    $('statusText').textContent = 'Camera unavailable';
    return false;
  }
}

// ===== Mock Generator =====
class MockGen {
  constructor() { this.fc = 0; }
  gen(w, h) {
    this.fc++;
    const px = new Uint8ClampedArray(w * h * 4);
    const t = this.fc * 0.05;
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const i = (y * w + x) * 4;
        const v = 1 - y / h;
        px[i] = Math.round(200 + 50 * v);
        px[i+1] = Math.round(180 + 70 * v);
        px[i+2] = Math.round(135 + 120 * v);
        px[i+3] = 255;
        for (let c = 0; c < 6; c++) {
          const cx = (160 + c*80 + 30*Math.sin(t + c*1.2)) % w;
          const cy = 80 + 30*Math.sin(t*0.7 + c*0.9);
          const r = 40 + 10*Math.sin(t*0.3 + c);
          const d = Math.hypot(x - cx, y - cy);
          if (d < r) {
            const b = Math.max(0.3, 1 - d/r);
            px[i] = Math.min(255, px[i] + Math.round(80*b));
            px[i+1] = Math.min(255, px[i+1] + Math.round(80*b));
            px[i+2] = Math.min(255, px[i+2] + Math.round(80*b));
          }
        }
        if (this.fc > 60 && this.fc % 300 < 150) {
          const scx = w*0.5 + 40*Math.sin(t*0.5), scy = h*0.3 + 15*Math.cos(t*0.7);
          const sd = Math.hypot(x - scx, y - scy);
          if (sd < 70) {
            const dk = Math.round(60*(1-sd/70));
            px[i] = Math.max(0, px[i] - dk);
            px[i+1] = Math.max(0, px[i+1] - dk + 20);
            px[i+2] = Math.max(0, px[i+2] - dk);
          }
        }
      }
    }
    return px;
  }
}

// ===== 360 Camera Renderer =====
function render360(canvasId, yaw, pitch, zoom) {
  const canvas = $(canvasId);
  if (!canvas || !canvas.getContext) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  
  // Draw a simulated 360° sky/ground view
  ctx.clearRect(0, 0, w, h);
  
  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, h);
  skyGrad.addColorStop(0, '#0a1628');
  skyGrad.addColorStop(0.4, '#1a2a4e');
  skyGrad.addColorStop(0.6, '#2a3a5e');
  skyGrad.addColorStop(0.8, '#4a5a3e');
  skyGrad.addColorStop(1, '#2a3a1e');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, w, h);

  // Draw grid lines (simulating equirectangular projection)
  ctx.strokeStyle = 'rgba(80,200,255,0.07)';
  ctx.lineWidth = 0.5;
  const gridLines = 12;
  for (let i = 0; i < gridLines; i++) {
    const angle = (i / gridLines) * Math.PI * 2 + yaw;
    const x = w/2 + Math.cos(angle) * w * 0.4 * zoom;
    const yPos = h/2 + Math.sin(angle) * h * 0.3 * zoom;
    ctx.beginPath();
    ctx.moveTo(w/2, h/2);
    ctx.lineTo(x, yPos);
    ctx.stroke();
  }

  // Draw horizon
  ctx.strokeStyle = 'rgba(80,200,255,0.2)';
  ctx.lineWidth = 1;
  const horizonY = h/2 - pitch * h * 0.3;
  ctx.beginPath();
  ctx.moveTo(0, horizonY);
  ctx.lineTo(w, horizonY);
  ctx.stroke();

  // Draw clouds in the 360 view
  const cloudColor = 'rgba(200,210,230,0.15)';
  ctx.fillStyle = cloudColor;
  const t = Date.now() / 10000;
  for (let i = 0; i < 15; i++) {
    const cx = ((i * 137 + 50 * Math.sin(i * 2.7 + t)) % 360) / 360 * w;
    const cy = horizonY - 20 - Math.abs(Math.sin(i * 3.1 + yaw + t * 0.3)) * h * 0.3;
    const cr = 20 + Math.sin(i * 4.2 + t * 0.5) * 10;
    ctx.beginPath();
    ctx.ellipse(cx, cy, cr, cr * 0.6, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Draw storm clouds
  ctx.fillStyle = 'rgba(100,100,120,0.2)';
  for (let i = 0; i < 5; i++) {
    const cx = ((i * 251 + t * 30) % 360) / 360 * w;
    const cy = horizonY - 40 - Math.sin(i * 5.1 + t * 0.2) * h * 0.15;
    const cr = 35 + Math.sin(i * 2.3) * 15;
    ctx.beginPath();
    ctx.ellipse(cx, cy, cr, cr * 0.7, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Draw compass direction marker
  ctx.fillStyle = 'rgba(80,200,255,0.5)';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('N', w/2, 12);
  ctx.fillText('S', w/2, h - 4);
  ctx.fillText('E', w - 4, h/2);
  ctx.fillText('W', 4, h/2);

  // Draw crosshair
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 0.5;
  ctx.setLineDash([3, 3]);
  ctx.beginPath();
  ctx.moveTo(w/2, 0); ctx.lineTo(w/2, h);
  ctx.moveTo(0, h/2); ctx.lineTo(w, h/2);
  ctx.stroke();
  ctx.setLineDash([]);

  // Centre dot
  ctx.fillStyle = 'rgba(80,200,255,0.4)';
  ctx.beginPath();
  ctx.arc(w/2, h/2, 2, 0, Math.PI * 2);
  ctx.fill();
}

function updateInsta360() {
  const overlay = $('insta360Overlay');
  if (!insta360.active) { overlay.style.display = 'none'; return; }
  
  overlay.style.display = 'block';
  
  if (insta360.expanded) {
    const expCanvas = $('insta360ExpandCanvas');
    expCanvas.width = window.innerWidth;
    expCanvas.height = window.innerHeight;
    $('insta360Expand').style.display = 'block';
    render360('insta360ExpandCanvas', insta360.yaw, insta360.pitch, insta360.zoom);
    $('insta360Overlay').style.display = 'none';
  } else {
    $('insta360Expand').style.display = 'none';
    render360('insta360Canvas', insta360.yaw, insta360.pitch, insta360.zoom);
  }
}

// ===== Touch Controls for 360 =====
function setup360Touch() {
  const overlay = $('insta360Overlay');
  const expDiv = $('insta360Expand');

  // PiP overlay touch
  overlay.addEventListener('touchstart', (e) => {
    e.preventDefault();
    e.stopPropagation();
    if (e.touches.length === 1) {
      insta360.lastTouchX = e.touches[0].clientX;
      insta360.lastTouchY = e.touches[0].clientY;
    } else if (e.touches.length === 2) {
      insta360.lastTouchDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
    }
  });

  overlay.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 1) {
      const dx = e.touches[0].clientX - insta360.lastTouchX;
      const dy = e.touches[0].clientY - insta360.lastTouchY;
      insta360.yaw -= dx * 0.01;
      insta360.pitch = Math.max(-1, Math.min(1, insta360.pitch - dy * 0.01));
      insta360.lastTouchX = e.touches[0].clientX;
      insta360.lastTouchY = e.touches[0].clientY;
      updateInsta360();
    } else if (e.touches.length === 2) {
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      insta360.zoom = Math.max(0.5, Math.min(3, insta360.zoom * (insta360.lastTouchDist / dist)));
      insta360.lastTouchDist = dist;
      updateInsta360();
    }
  });

  overlay.addEventListener('touchend', (e) => {
    if (e.changedTouches.length === 1 && !e.touches.length) {
      // Single tap - expand
      insta360.expanded = true;
      updateInsta360();
    }
  });

  // Expanded view touch
  expDiv.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      insta360.lastTouchX = e.touches[0].clientX;
      insta360.lastTouchY = e.touches[0].clientY;
    }
  });

  expDiv.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 1) {
      const dx = e.touches[0].clientX - insta360.lastTouchX;
      const dy = e.touches[0].clientY - insta360.lastTouchY;
      insta360.yaw -= dx * 0.005;
      insta360.pitch = Math.max(-1, Math.min(1, insta360.pitch - dy * 0.005));
      insta360.lastTouchX = e.touches[0].clientX;
      insta360.lastTouchY = e.touches[0].clientY;
      updateInsta360();
    }
  });

  $('insta360Close').onclick = () => {
    insta360.expanded = false;
    updateInsta360();
  };
}

// ===== Color utilities =====
function hsv(r,g,b){
  const R=r/255,G=g/255,B=b/255,mx=Math.max(R,G,B),mn=Math.min(R,G,B),d=mx-mn;
  let h=0,s=0,v=mx;
  if(d){s=d/mx;if(mx===R)h=60*(((G-B)/d)%6);else if(mx===G)h=60*((B-R)/d+2);else h=60*((R-G)/d+4);if(h<0)h+=360;}
  return[h,s,v];
}

function isC(r,g,b){
  const gr=(r+g+b)/3;
  return gr>=160&&hsv(r,g,b)[2]>0.65&&hsv(r,g,b)[1]<0.35;
}

// ===== Detection =====
function detect(px,w,h){
  const cm=[];let cp=0;
  for(let y=0;y<h;y++){
    const r=[];
    for(let x=0;x<w;x++){
      const i=(y*w+x)*4,v=isC(px[i],px[i+1],px[i+2])?255:0;
      r.push(v);
      if(v)cp++;
    }
    cm.push(r);
  }
  const cover=cp/(w*h);
  const score=cover>0.15?Math.min(cover*0.55,0.55)+(cp>10?0.2:0):0;
  const isStorm=score>=0.45;
  const type=score>0.55?'cumulonimbus':score>0.3?'cumulus congestus':cover>0.3?'cumulus':'scattered';
  return{cm,count:cp>0?Math.min(Math.ceil(cp/100),20):0,cover,score:Math.min(score,1),type,isStorm};
}

// ===== Capture camera frame to canvas =====
function captureFrame() {
  const video = $('phoneVideo');
  if (!cameraActive || !video || !video.videoWidth) return null;
  
  const w = 160, h = 120;
  const canvas = document.createElement('canvas');
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, w, h);
  return ctx.getImageData(0, 0, w, h).data;
}

// ===== Main loop =====
const gen = new MockGen();
let prevGray = null;

function processFrame() {
  frameCount++;
  const w = 160, h = 120;
  
  let px;
  if (cameraActive && !useMock) {
    const frame = captureFrame();
    if (frame) {
      px = frame;
    } else {
      px = gen.gen(w, h);
    }
  } else {
    px = gen.gen(w, h);
  }
  
  // Detection
  const d = detect(px, w, h);
  cloudData = d;

  // Motion tracking (block matching)
  const gray = [];
  for (let y = 0; y < h; y++) {
    const r = [];
    for (let x = 0; x < w; x++)
      r.push(0.299*px[(y*w+x)*4] + 0.587*px[(y*w+x)*4+1] + 0.114*px[(y*w+x)*4+2]);
    gray.push(r);
  }
  
  if (prevGray) {
    let tx = 0, ty = 0, n = 0;
    for (let by = 0; by + 8 <= h; by += 12)
      for (let bx = 0; bx + 8 <= w; bx += 12) {
        if (!d.cm[by]?.[bx]) continue;
        let best = Infinity, bdx = 0, bdy = 0;
        for (let sy = -4; sy <= 4; sy += 2) for (let sx = -4; sx <= 4; sx += 2) {
          const ry = by+sy, rx = bx+sx;
          if (ry<0||ry+8>h||rx<0||rx+8>w) continue;
          let ssd = 0;
          for (let dy = 0; dy < 8; dy++) for (let dx = 0; dx < 8; dx++) {
            const df = gray[by+dy][bx+dx] - prevGray[ry+dy][rx+dx];
            ssd += df*df;
          }
          if (ssd < best) { best = ssd; bdx = -sx; bdy = -sy; }
        }
        if (best < 8000) { tx += bdx; ty += bdy; n++; }
      }
    motion = n > 0 ? { dx: tx/n, dy: ty/n, mag: Math.hypot(tx/n, ty/n), dir: Math.atan2(ty/n, tx/n) } : { dx: 0, dy: 0, mag: 0, dir: 0 };
  }
  prevGray = gray;

  // Wind direction from motion
  let windDir = '--';
  if (motion.mag > 0.3) {
    const deg = ((motion.dir * 180 / Math.PI) + 360 + 90) % 360;
    const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
    windDir = dirs[Math.round(deg / 22.5) % 16] + ' ' + motion.mag.toFixed(1);
  }

  // Update UI
  $('hudClouds').textContent = d.count;
  $('hudCover').textContent = (d.cover*100).toFixed(0)+'%';
  $('hudScore').textContent = (d.score*100).toFixed(0)+'%';
  $('hudType').textContent = d.type.toUpperCase().slice(0,10);
  $('hudMotion').textContent = motion.mag > 0.5 ? motion.mag.toFixed(1)+'px/s' : '--';
  $('hudWindDir').textContent = windDir;
  $('frameInfo').textContent = 'Frame ' + frameCount;

  // Cloud overlay
  const el = $('cloudOverlay');
  if (!showMask || !d.cm.length) { el.innerHTML = ''; } else {
    const mh = d.cm.length, mw = d.cm[0].length;
    const bw = el.offsetWidth || 300, bh = el.offsetHeight || 200;
    let html = '';
    for (let y = 0; y < mh; y+=2) for (let x = 0; x < mw; x+=2)
      if (d.cm[y][x] > 0)
        html += `<div class="cloud-cell" style="left:${(x/mw)*bw}px;top:${(y/mh)*bh}px;width:${(2/mw)*bw+1}px;height:${(2/mh)*bh+1}px"></div>`;
    el.innerHTML = html;
  }

  // Storm alert
  const alert = $('stormAlert');
  if (d.isStorm && d.score >= 0.45) {
    alert.style.display = 'block';
    alert.className = 'alert-bar ' + (d.score >= 0.7 ? 'severe' : 'moderate');
    $('alertTitle').textContent = '⚠️ ' + (d.score >= 0.7 ? 'SEVERE' : 'MODERATE') + ' STORM';
    $('alertSub').textContent = 'Score: '+(d.score*100).toFixed(0)+'%';
  } else alert.style.display = 'none';
}

// ===== Sensor updates =====
function updateSensors() {
  if (window.StormVisionNative) {
    try {
      const data = JSON.parse(window.StormVisionNative.getSensorData());
      const compass = $('compass');
      if (data.hasCompass) {
        const deg = Math.round(data.azimuth);
        $('compassNeedle').style.transform = `rotate(${data.azimuth}deg)`;
        $('compassLabel').textContent = deg + '°';
        compass.style.display = 'block';
      } else {
        compass.style.display = 'none';
      }
      if (data.hasBarometer) {
        $('pressureDisplay').textContent = '🌡️ ' + data.pressure.toFixed(1) + ' hPa';
      }
      if (data.isRecording) {
        $('ctrlMic').classList.add('active');
        $('recIndicator').style.display = 'block';
      }
    } catch(e) {}
  }
}

// ===== Controls =====
$('ctrlMask').onclick = () => {
  showMask = !showMask;
  $('ctrlMask').classList.toggle('active');
};

$('ctrlMic').onclick = () => {
  if (window.StormVisionNative) {
    if (!isRecording) {
      window.StormVisionNative.startRecording();
      isRecording = true;
      $('ctrlMic').classList.add('active');
      $('recIndicator').style.display = 'block';
    } else {
      window.StormVisionNative.stopRecording();
      isRecording = false;
      $('ctrlMic').classList.remove('active');
      $('recIndicator').style.display = 'none';
    }
  }
};

$('ctrlCam').onclick = () => {
  if (cameraActive) {
    useMock = !useMock;
    $('ctrlCam').classList.toggle('active');
    $('camLabel').textContent = useMock ? '☁️ Sky Camera' : '📷 Live Camera';
    $('camLabel').style.display = useMock ? 'block' : 'none';
    if (!useMock) {
      $('phoneVideo').style.display = 'block';
    }
  }
};

$('ctrl360').onclick = () => {
  insta360.active = !insta360.active;
  $('ctrl360').classList.toggle('active');
  if (insta360.active) {
    insta360.expanded = false;
    updateInsta360();
    // Simulate connection
    $('statusText').textContent = '360° Camera ready';
    setTimeout(() => {
      insta360.connected = true;
      $('statusText').textContent = '360° Connected';
    }, 1500);
  } else {
    $('insta360Overlay').style.display = 'none';
    $('insta360Expand').style.display = 'none';
    $('statusText').textContent = cameraActive ? 'Camera OK' : 'Running...';
  }
};

$('ctrlReset').onclick = () => {
  frameCount = 0;
  prevGray = null;
  if (insta360.active) {
    insta360.yaw = 0;
    insta360.pitch = 0;
    insta360.zoom = 1;
    updateInsta360();
  }
  $('statusText').textContent = 'Reset OK';
  setTimeout(() => {
    $('statusText').textContent = cameraActive ? 'Camera OK' : 'Running...';
  }, 1000);
};

// ===== Init =====
async function init() {
  // Try to start camera
  const camStarted = await startCamera();
  if (!camStarted) {
    useMock = true;
    $('camLabel').textContent = '☁️ Simulated Sky';
    $('camLabel').style.display = 'block';
  }
  
  // Set initial states
  $('ctrlMask').classList.add('active');
  $('statusText').textContent = cameraActive ? 'Camera OK' : 'Running...';
  
  // Only show compass if in Android WebView
  if (window.StormVisionNative) {
    $('compass').style.display = 'block';
  } else {
    $('compass').style.display = 'none';
  }
  
  // Setup touch controls for 360
  setup360Touch();
  
  // Main loop
  setInterval(processFrame, 800);
  setInterval(updateSensors, 200);
  setInterval(updateInsta360, 100);
  
  // Periodic 360 rotation when idle
  setInterval(() => {
    if (insta360.active && !insta360.expanded) {
      insta360.yaw += 0.002;
      // Slight pitch oscillation
      insta360.pitch = Math.sin(Date.now() / 15000) * 0.1;
    }
  }, 50);
}

// Start when ready
if (document.readyState === 'complete') {
  init();
} else {
  window.onload = init;
}
</script>
</body>
</html>
